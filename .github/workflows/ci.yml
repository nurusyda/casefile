name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "fastmcp>=0.9" "mcp>=1.0" "pytest>=8" "pytest-asyncio>=0.23"

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

