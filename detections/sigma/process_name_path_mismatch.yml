title: Legitimate Process Name Running from Unexpected Path
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: >
  Detects a process whose name matches a known Windows system binary but whose
  image path is outside the expected system directories. This is a primary
  indicator of masquerading. Observed in CRIMSON OSPREY: CSRSS.EXE running
  from C:\Windows\Temp\Perfmon\ instead of C:\Windows\System32\. The process
  name is identical to the legitimate Client Server Runtime Subsystem, allowing
  it to evade casual visual inspection of running process lists.
references:
  - https://attack.mitre.org/techniques/T1036/005/
author: CaseFile — SANS Find Evil! 2026
date: 2026-05-19
modified: 2026-05-19
tags:
  - attack.defense_evasion
  - attack.t1036.005
logsource:
  product: windows
  category: process_creation
detection:
  selection_csrss:
    Image|endswith: '\csrss.exe'
    Image|not|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  selection_lsass:
    Image|endswith: '\lsass.exe'
    Image|not|startswith:
      - 'C:\Windows\System32\'
  selection_svchost:
    Image|endswith: '\svchost.exe'
    Image|not|startswith:
      - 'C:\Windows\System32\'
      - 'C:\Windows\SysWOW64\'
  selection_services:
    Image|endswith: '\services.exe'
    Image|not|startswith:
      - 'C:\Windows\System32\'
  selection_winlogon:
    Image|endswith: '\winlogon.exe'
    Image|not|startswith:
      - 'C:\Windows\System32\'
  condition: 1 of selection_*
falsepositives:
  - Software installers that temporarily extract and execute system-named binaries
  - Sysinternals tools that may rename themselves
level: critical
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
