title: ProcDump Targeting LSASS for Credential Dumping
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: stable
description: >
  Detects execution of procdump.exe (or renamed variants) with lsass.exe as
  the target process, which is a standard credential dumping technique.
  Observed in CRIMSON OSPREY: procdump.exe executed with lsass.exe as the
  target, producing a memory dump file containing cached credentials. The
  dump file was subsequently exfiltrated via the established C2 channel to
  172.16.6.12. This technique is used to harvest domain credentials for
  lateral movement without requiring a kernel-mode driver.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://docs.microsoft.com/en-us/sysinternals/downloads/procdump
author: CaseFile — SANS Find Evil! 2026
date: 2026-05-19
modified: 2026-05-19
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_procdump_name:
    Image|endswith:
      - '\procdump.exe'
      - '\procdump64.exe'
    CommandLine|contains:
      - 'lsass'
      - '-ma'
  selection_procdump_renamed:
    CommandLine|contains:
      - 'lsass'
      - '-ma'
  condition: 1 of selection_procdump_*
falsepositives:
  - Authorized memory analysis by security teams using procdump under change management
  - EDR agents performing legitimate lsass inspection
level: critical
fields:
  - Image
  - CommandLine
  - ParentImage
  - User
  - ProcessId
  - TargetImage
